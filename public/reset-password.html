<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Reset Password — Pattro</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 32 32\'><rect width=\'32\' height=\'32\' rx=\'7\' fill=\'%230d1117\'/><text x=\'16\' y=\'26\' text-anchor=\'middle\' font-family=\'Georgia,serif\' font-size=\'22\' font-weight=\'700\' fill=\'white\'>P</text><circle cx=\'27\' cy=\'5\' r=\'5\' fill=\'%233ecfcf\'/></svg>">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0b;--surface:#111113;--border:#26262e;--border2:#32323c;--text:#eeeef0;--text2:#9898a6;--text3:#52525e;--teal:#3ecfcf;--green:#3dba72;--red:#e05555}
    body{background:var(--bg);color:var(--text);font-family:\'Geist Mono\',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .box{background:var(--surface);border:1px solid var(--border2);border-top:2px solid var(--teal);border-radius:14px;padding:32px;width:min(400px,100%)}
    .logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
    .logo-mark{position:relative;width:32px;height:32px;flex-shrink:0}
    .logo-p{position:absolute;bottom:0;left:0;font-family:Georgia,serif;font-size:28px;font-weight:700;color:#fff;line-height:1}
    .logo-dot{position:absolute;top:0;right:0;width:9px;height:9px;background:#3ecfcf;border-radius:50%}
    .logo-name{font-family:Georgia,serif;font-size:16px;font-weight:700;color:#eeeef0}
    h1{font-size:18px;font-weight:700;margin-bottom:8px}
    .sub{font-size:11px;color:var(--text2);margin-bottom:24px;line-height:1.6}
    .form-group{margin-bottom:16px}
    .form-label{display:block;font-size:10px;color:var(--text2);margin-bottom:6px;letter-spacing:.3px}
    .form-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;color:var(--text);font-family:\'Geist Mono\',monospace;font-size:12px;outline:none;transition:border-color .15s}
    .form-input:focus{border-color:var(--teal)}
    .btn{width:100%;padding:11px;background:var(--teal);color:#0a0a0b;border:none;border-radius:8px;font-family:\'Geist Mono\',monospace;font-size:12px;font-weight:800;cursor:pointer;letter-spacing:.3px}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .msg{font-size:11px;min-height:16px;margin-bottom:12px;padding:8px 12px;border-radius:6px;display:none}
    .msg.ok{color:var(--green);background:rgba(61,186,114,.1);border:1px solid rgba(61,186,114,.25);display:block}
    .msg.err{color:var(--red);background:rgba(224,85,85,.1);border:1px solid rgba(224,85,85,.25);display:block}
    .back{display:block;text-align:center;margin-top:16px;font-size:11px;color:var(--text3);text-decoration:none}
    .back:hover{color:var(--teal)}
    #form-area{transition:opacity .2s}
  </style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-mark">
      <span class="logo-p">P</span>
      <span class="logo-dot"></span>
    </div>
    <span class="logo-name">pattro</span>
  </div>

  <h1>Set new password</h1>
  <p class="sub">Enter your new password below.</p>

  <div id="msg" class="msg"></div>
  <div id="form-area">
    <div class="form-group">
      <label class="form-label">New password</label>
      <input class="form-input" type="password" id="new-pass" placeholder="At least 8 characters" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label class="form-label">Confirm password</label>
      <input class="form-input" type="password" id="confirm-pass" placeholder="Repeat your password" autocomplete="new-password">
    </div>
    <button class="btn" id="save-btn" onclick="saveNewPassword()">Save new password</button>
  </div>
  <a href="/login" class="back">← Back to login</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient(
  'https://qljuusxpzsiqxnpfpdgg.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsanV1c3hwenNpcXhucGZwZGdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1OTQ5NzUsImV4cCI6MjA4ODE3MDk3NX0.rUEwuG4zFE_EpAM4s3hWqVF81xiW9q_MSwQKKXYZmlk'
);

function showMsg(text, type) {
  var el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

function disableForm(reason) {
  document.getElementById('form-area').style.opacity = '0.4';
  document.getElementById('form-area').style.pointerEvents = 'none';
  showMsg(reason, 'err');
}

// Supabase sends the recovery token in the URL hash as:
// #access_token=...&refresh_token=...&type=recovery
// We need to extract these and set the session manually.
async function init() {
  var hash = window.location.hash;

  if (!hash || !hash.includes('access_token')) {
    disableForm('Invalid or expired reset link. Please request a new one from the login page.');
    return;
  }

  // Parse hash params
  var params = {};
  hash.slice(1).split('&').forEach(function(part) {
    var kv = part.split('=');
    params[decodeURIComponent(kv[0])] = decodeURIComponent(kv.slice(1).join('='));
  });

  if (params.type !== 'recovery') {
    disableForm('This link is not a password reset link.');
    return;
  }

  // Set the session using the tokens from the URL
  // This authenticates the user so we can call updateUser
  var { error } = await sb.auth.setSession({
    access_token:  params.access_token,
    refresh_token: params.refresh_token || ''
  });

  if (error) {
    disableForm('Reset link is invalid or has expired. Please request a new one.');
    return;
  }

  // Clear the hash from URL so token is not visible
  window.history.replaceState({}, '', window.location.pathname);
  showMsg('', '');
}

async function saveNewPassword() {
  var pass    = document.getElementById('new-pass').value;
  var confirm = document.getElementById('confirm-pass').value;
  var btn     = document.getElementById('save-btn');

  if (!pass || pass.length < 8) {
    showMsg('Password must be at least 8 characters.', 'err');
    return;
  }
  if (pass !== confirm) {
    showMsg('Passwords do not match.', 'err');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Saving...';

  var { error } = await sb.auth.updateUser({ password: pass });

  if (error) {
    showMsg(error.message || 'Error updating password. Try requesting a new link.', 'err');
    btn.disabled = false;
    btn.textContent = 'Save new password';
  } else {
    showMsg('✓ Password updated! Redirecting to login...', 'ok');
    btn.textContent = '✓ Done';
    await sb.auth.signOut();
    setTimeout(function() { window.location.href = '/login'; }, 2000);
  }
}

document.getElementById('confirm-pass').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') saveNewPassword();
});

init();
</script>
</body>
</html>
