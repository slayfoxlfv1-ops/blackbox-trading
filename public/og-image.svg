<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0b"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="teal-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3ecfcf;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#3ecfcf;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle teal glow top-right -->
  <circle cx="1050" cy="80" r="300" fill="url(#teal-glow)"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#26262e" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#26262e" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#26262e" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#26262e" stroke-width="1"/>

  <!-- Logo mark -->
  <rect x="80" y="70" width="72" height="72" rx="16" fill="#111113" stroke="#26262e" stroke-width="1.5"/>
  <text x="116" y="128" text-anchor="middle" font-family="Georgia,serif" font-size="52" font-weight="700" fill="white">P</text>
  <circle cx="148" cy="79" r="10" fill="#3ecfcf"/>

  <!-- Brand name -->
  <text x="170" y="106" font-family="Georgia,serif" font-size="32" font-weight="700" fill="white" letter-spacing="-0.5">pattro</text>
  <text x="170" y="126" font-family="'Courier New',monospace" font-size="10" font-weight="400" fill="#5a9e9e" letter-spacing="3">TRADING JOURNAL</text>

  <!-- Main headline -->
  <text x="80" y="240" font-family="Georgia,serif" font-size="64" font-weight="700" fill="white" letter-spacing="-1">Trading Psychology</text>
  <text x="80" y="318" font-family="Georgia,serif" font-size="64" font-weight="700" fill="#3ecfcf" letter-spacing="-1">Engine</text>

  <!-- Subheadline -->
  <text x="80" y="390" font-family="Arial,sans-serif" font-size="24" fill="#9898a6">Understand why you make bad decisions.</text>
  <text x="80" y="422" font-family="Arial,sans-serif" font-size="24" fill="#9898a6">Not just how much you won or lost.</text>

  <!-- Feature pills -->
  <rect x="80" y="468" width="160" height="34" rx="17" fill="#111113" stroke="#3ecfcf" stroke-width="1"/>
  <text x="160" y="490" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#3ecfcf">AI Coach</text>

  <rect x="254" y="468" width="180" height="34" rx="17" fill="#111113" stroke="#26262e" stroke-width="1"/>
  <text x="344" y="490" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#9898a6">Mental Score</text>

  <rect x="448" y="468" width="200" height="34" rx="17" fill="#111113" stroke="#26262e" stroke-width="1"/>
  <text x="548" y="490" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#9898a6">Emotion Tracking</text>

  <rect x="662" y="468" width="180" height="34" rx="17" fill="#111113" stroke="#26262e" stroke-width="1"/>
  <text x="752" y="490" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#9898a6">Rule Enforcement</text>

  <!-- Price tag -->
  <rect x="900" y="390" width="220" height="80" rx="12" fill="#111113" stroke="#3ecfcf" stroke-width="1.5"/>
  <text x="1010" y="430" text-anchor="middle" font-family="Georgia,serif" font-size="36" font-weight="700" fill="white">$15</text>
  <text x="1010" y="455" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#9898a6">/month · Cancel anytime</text>

  <!-- URL -->
  <text x="1120" y="600" text-anchor="end" font-family="'Courier New',monospace" font-size="16" fill="#5a9e9e">pattro.com</text>
</svg>